<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Bookmarks - Light Novel Reader</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/style.css">
    
    <!-- Base URL for subdirectory -->
    <base href="/light-novel/">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-left">
                <i class="fas fa-book-open header-icon"></i>
                <h1>Light Novel Reader</h1>
            </div>
            <div class="header-controls">
                <a href="./" class="nav-link" title="Home">
                    <i class="fas fa-home"></i>
                    <span class="nav-text">Home</span>
                </a>
                <a href="./bookmark.html" class="nav-link active" title="Bookmarks">
                    <i class="fas fa-bookmark"></i>
                    <span class="nav-text">Bookmarks</span>
                </a>
                <a href="./" class="icon-btn" id="backBtn" title="Back to Home">
                    <i class="fas fa-arrow-left"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h2><i class="fas fa-bookmark"></i> My Bookmarks</h2>
        </div>

        <div id="loadingIndicator" class="loading hidden">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Loading bookmarks...</span>
        </div>
        
        <div id="errorMessage" class="error hidden">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div id="emptyBookmarks" class="empty-state hidden">
            <i class="fas fa-bookmark fa-4x"></i>
            <h3>No Bookmarks Yet</h3>
            <p>Start bookmarking your favorite novels to see them here!</p>
            <a href="./" class="btn-primary">
                <i class="fas fa-home"></i>
                Browse Novels
            </a>
        </div>
        
        <div id="bookmarkGrid" class="novel-grid"></div>
    </main>

    <button id="scrollToTopBtn" class="scroll-top hidden" title="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="./assets/script.js"></script>
</body>
</html>
