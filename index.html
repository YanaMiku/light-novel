<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Light Novel Reader</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-left">
                <i class="fas fa-book-open header-icon"></i>
                <h1>Light Novel Reader</h1>
            </div>
            <div class="header-controls">
                <a href="/" class="nav-link active" title="Home">
                    <i class="fas fa-home"></i>
                    <span class="nav-text">Home</span>
                </a>
                <a href="/bookmark.html" class="nav-link" title="Bookmarks">
                    <i class="fas fa-bookmark"></i>
                    <span class="nav-text">Bookmarks</span>
                </a>
                <button class="icon-btn" id="settingsBtn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="search-section">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search novels by title..." 
                    class="search-input"
                    autocomplete="off"
                >
                <button class="search-clear" id="searchClear">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
            <div class="sort-wrapper">
                <i class="fas fa-sort sort-icon"></i>
                <select id="sortSelect" class="sort-select">
                    <option value="az">A-Z</option>
                    <option value="latest">Terbaru</option>
                </select>
            </div>
        </div>

        <div id="continueReadingSection" class="continue-reading hidden">
            <h3>
                <i class="fas fa-clock-rotate-left"></i>
                Continue Reading
            </h3>
            <div id="continueReadingCard" class="continue-card"></div>
        </div>

        <div id="loadingIndicator" class="loading hidden">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Loading novels...</span>
        </div>
        
        <div id="errorMessage" class="error hidden">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>
        
        <div id="novelGrid" class="novel-grid"></div>
        
        <div class="pagination">
            <button id="loadMoreBtn" class="load-more hidden">
                <i class="fas fa-chevron-down"></i>
                <span>Load More</span>
            </button>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> Settings</h3>
                <button class="modal-close" id="closeSettingsBtn" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>
                        <i class="fas fa-palette"></i>
                        Theme
                    </label>
                    <select id="themeSelect">
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>
                        <i class="fas fa-eye"></i>
                        Show Reader Toolbar
                    </label>
                    <label class="switch">
                        <input type="checkbox" id="showReaderToolbar" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <button id="scrollToTopBtn" class="scroll-top hidden" title="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="/assets/script.js"></script>
</body>
</html>
